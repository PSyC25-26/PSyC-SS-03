# ============================================================
# .github/workflows/doxygen-docs.yml
# Genera documentación Doxygen y la publica en gh-pages/doxygen/
#
# URL resultado:
#   https://psyc25-26.github.io/PSyC-SS-03/doxygen/index.html
# ============================================================

name: Doxygen Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  doxygen:
    name: Build Doxygen + Deploy gh-pages/doxygen/
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout con historial completo (necesario para git describe --tags)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Instalar Doxygen 1.13.2 desde GitHub releases y Graphviz
      - name: Instalar Doxygen y Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          wget -q https://github.com/doxygen/doxygen/releases/download/Release_1_13_2/doxygen-1.13.2.linux.bin.tar.gz
          tar -xzf doxygen-1.13.2.linux.bin.tar.gz
          sudo cp doxygen-1.13.2/bin/doxygen /usr/local/bin/doxygen
          doxygen --version

      # 3. Verificar versiones
      - name: Verificar versiones
        run: |
          doxygen --version
          dot -version

      # 4. Generar documentación llamando a Doxygen directamente
      # mkdir -p crea target/doxygen antes de que Doxygen intente escribir ahí
      - name: Generar documentación Doxygen
        working-directory: JailQ
        run: |
          mkdir -p target/doxygen
          doxygen src/main/resources/Doxyfile

      # 5. Verificar que se generó el HTML
      - name: Verificar salida
        run: ls JailQ/target/doxygen/html/ | head -10

      # 6. Publicar en gh-pages/doxygen/
      - name: Deploy a gh-pages/doxygen/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./JailQ/target/doxygen/html
          destination_dir: doxygen
          publish_branch: gh-pages
          keep_files: true
          commit_message: "docs: actualizar documentación Doxygen [skip ci]"
