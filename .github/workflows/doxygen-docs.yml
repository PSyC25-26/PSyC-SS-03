# ============================================================
# .github/workflows/doxygen-docs.yml
# Genera documentación Doxygen y la publica en gh-pages/doxygen/
#
# URL resultado:
#   https://PSyC25-26.github.io/PSyC-SS-03/doxygen/index.html
#
# PREREQUISITOS (una sola vez):
#   1. Settings → Actions → General → Workflow permissions
#      → Read and write permissions ✓
#   2. Rama gh-pages creada
#   3. Settings → Pages → Source: gh-pages branch / (root)
# ============================================================

name: Doxygen Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  doxygen:
    name: Build Doxygen + Deploy gh-pages/doxygen/
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout con historial completo (necesario para git describe --tags)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Java 17 con caché Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 3. Instalar Doxygen y Graphviz
      - name: Instalar Doxygen y Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      # 4. Verificar versiones instaladas
      - name: Verificar versiones
        run: |
          doxygen --version
          dot -version

      # 5. Generar documentación con Maven
      # working-directory: JailQ porque el pom.xml está en la subcarpeta JailQ/
      - name: Generar documentación Doxygen
        working-directory: JailQ
        run: mvn com.soebes.maven.plugins:doxygen-maven-plugin:1.1.0:report --no-transfer-progress

      # 6. Publicar en gh-pages/doxygen/
      # publish_dir apunta a JailQ/target/doxygen/html/ por la misma razón
      # keep_files: true → no borra otros artefactos en gh-pages (Sphinx, etc.)
      - name: Deploy a gh-pages/doxygen/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./JailQ/target/doxygen/html
          destination_dir: doxygen
          publish_branch: gh-pages
          keep_files: true
          commit_message: "docs: actualizar documentación Doxygen [skip ci]"
