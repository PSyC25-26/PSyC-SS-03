# ============================================================
# .github/workflows/doxygen-docs.yml
# Genera documentación Doxygen y la publica en gh-pages/doxygen/
#
# URL resultado:
#   https://psyc25-26.github.io/PSyC-SS-03/doxygen/index.html
# ============================================================

name: Doxygen Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  doxygen:
    name: Build Doxygen + Deploy gh-pages/doxygen/
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout con historial completo (necesario para git describe --tags)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Java 17 con caché Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 3. Instalar Doxygen y Graphviz
      - name: Instalar Doxygen y Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      # 4. Verificar que doxygen está en PATH
      - name: Verificar doxygen en PATH
        run: which doxygen && doxygen --version

      # 5. Generar documentación con Maven
      # Se fuerza el PATH para asegurar que el plugin encuentra doxygen
      - name: Generar documentación Doxygen
        working-directory: JailQ
        env:
          PATH: /usr/bin:${{ env.PATH }}
        run: |
          doxygen --version
          mvn com.soebes.maven.plugins:doxygen-maven-plugin:1.1.0:report --no-transfer-progress

      # 6. Publicar en gh-pages/doxygen/
      - name: Deploy a gh-pages/doxygen/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./JailQ/target/doxygen/html
          destination_dir: doxygen
          publish_branch: gh-pages
          keep_files: true
          commit_message: "docs: actualizar documentación Doxygen [skip ci]"
