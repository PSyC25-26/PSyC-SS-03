name: Java Test Only

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Clona tu repo
      - uses: actions/checkout@v4

      # Configura JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Ejecuta solo los tests en el subdirectorio JailQ
      - name: Run Tests
        working-directory: JailQ
        run: mvn test
